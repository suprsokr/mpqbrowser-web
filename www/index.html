<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPQ Browser</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 1rem;
        background: #111;
        color: #eee;
      }
      h1 { margin-top: 0; }
      button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 0.4rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      #status {
        margin: 1rem 0;
        color: #aaa;
      }
      #stats {
        margin: 1rem 0;
        font-size: 0.9rem;
        color: #aaa;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
        font-size: 0.85rem;
      }
      th, td {
        padding: 0.4rem 0.6rem;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      th {
        background: #1a1a1a;
        position: sticky;
        top: 0;
      }
      tr:hover td {
        background: #1a1a1a;
      }
      .path {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }
      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .flag {
        display: inline-block;
        padding: 0.1rem 0.3rem;
        border-radius: 0.2rem;
        font-size: 0.75rem;
        margin-right: 0.2rem;
      }
      .flag.enc { background: #7c3aed; }
      .flag.comp { background: #059669; }
      .flag.single { background: #b45309; }
      #progress {
        width: 100%;
        max-width: 400px;
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <h1>MPQ Browser</h1>
    <p>
      Select a folder containing one or more MPQ files.
    </p>
    <button id="pick-folder">Select Folder</button>
    <div id="status">Ready</div>
    <progress id="progress" value="0" max="100" hidden></progress>
    <div id="stats"></div>
    <input id="filter" type="search" placeholder="Filter paths..." hidden style="width: 100%; max-width: 400px; padding: 0.4rem; margin-top: 0.5rem;" />
    <div id="pagination" hidden style="margin: 0.75rem 0; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
      <button id="prev-page">Prev</button>
      <span id="page-info"></span>
      <button id="next-page">Next</button>
      <label style="margin-left: 1rem;">Page size:
        <select id="page-size">
          <option value="100" selected>100</option>
          <option value="250">250</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
        </select>
      </label>
    </div>
    <div id="table-container"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
